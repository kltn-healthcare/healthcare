version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: healthcare_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/healthcare.com.pem:/etc/nginx/ssl/healthcare.com.pem:ro
      - ./nginx/healthcare.com-key.pem:/etc/nginx/ssl/healthcare.com-key.pem:ro
    networks:
      - clinic_network
    # Giúp Nginx nhận diện được 'host.docker.internal' trên Windows để trỏ về Next.js port 3000
    extra_hosts:
      - "host.docker.internal:host-gateway"
  postgres:
    image: postgres:16
    container_name: healthcare_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-healthcare}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports: 
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - clinic_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-healthcare}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: healthcare_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - clinic_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local


networks:
  clinic_network:
    driver: bridge
