events {
    worker_connections 1024;
}

http {
    # Cấu hình tự động chuyển hướng từ HTTP (port 80) sang HTTPS
    server {
        listen 80;
        server_name healthcare.com www.healthcare.com;
        return 301 https://$host$request_uri;
    }

    # Cấu hình HTTPS (port 443)
    server {
        listen 443 ssl;
        server_name healthcare.com www.healthcare.com;

        # Đường dẫn tới chứng chỉ SSL bên trong container Nginx
        ssl_certificate /etc/nginx/ssl/healthcare.com.pem;
        ssl_certificate_key /etc/nginx/ssl/healthcare.com-key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            # Vì Next.js chạy dưới máy host (cổng 3000), ta dùng host.docker.internal
            proxy_pass http://host.docker.internal:3000;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}